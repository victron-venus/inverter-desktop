name: inverter-desktop-infra
description: GitHub repository infrastructure for inverter-desktop
runtime:
  name: nodejs
  options:
    packagemanager: npm

# Required config values – set these before the first deploy:
#
#   pulumi config set github:owner victron-venus
#   pulumi config set --secret github:token <your-github-pat>
#   pulumi config set --secret cargoRegistryToken <crates.io-token>
#
# The GitHub PAT needs scopes: repo, admin:repo_hook, read:org
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
