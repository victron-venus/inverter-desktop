name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC to catch newly published advisories.
    - cron: '0 8 * * 1'

permissions:
  contents: read

concurrency:
  group: cargo-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if Cargo files changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            base="${{ github.event.pull_request.base.sha || github.event.before }}"
            if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^src-tauri/Cargo\.(toml|lock)$'; then
              echo "any_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "any_changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Harden the runner (Audit all outbound calls)
        if: steps.changed.outputs.any_changed == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.changed.outputs.any_changed == 'true'

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.changed.outputs.any_changed == 'true'
        with:
          workspaces: ./src-tauri -> target

      - name: Install cargo-audit
        if: steps.changed.outputs.any_changed == 'true'
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        if: steps.changed.outputs.any_changed == 'true'
        working-directory: src-tauri
        run: cargo audit

      - name: Skip (no Cargo changes)
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Cargo changes — audit skipped"
