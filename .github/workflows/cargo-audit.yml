name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC to catch newly published advisories.
    - cron: '0 8 * * 1'

permissions:
  contents: read

concurrency:
  group: cargo-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Check if Cargo files changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            base="${{ github.event.pull_request.base.sha || github.event.before }}"
            if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^src-tauri/Cargo\.(toml|lock)$'; then
              echo "any_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "any_changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Harden the runner (Audit all outbound calls)
        if: steps.changed.outputs.any_changed == 'true'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.changed.outputs.any_changed == 'true'

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.changed.outputs.any_changed == 'true'
        with:
          workspaces: ./src-tauri -> target

      - name: Install cargo-audit
        if: steps.changed.outputs.any_changed == 'true'
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        if: steps.changed.outputs.any_changed == 'true'
        working-directory: src-tauri
        # rustls-webpki 0.102.x advisories — transitive via rumqttc 0.25,
        # no semver-compatible fix available. Remove ignores when rumqttc
        # upgrades to webpki >= 0.103.
        # quick-xml 0.39.x advisories — transitive via plist 1.9.0 → tauri,
        # plist requires ^0.39.2, upstream needs to update.
        run: >
          cargo audit
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195

      - name: Skip (no Cargo changes)
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Cargo changes — audit skipped"
