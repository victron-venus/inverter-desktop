name: Mobile

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Init iOS project
        run: pnpm tauri ios init --ci
      - name: Disable code signing in Xcode project
        run: |
          PBXPROJ=src-tauri/gen/apple/inverter-dashboard.xcodeproj/project.pbxproj
          # Switch to Manual signing so Xcode doesn't look for Apple accounts
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBXPROJ"
          # Ensure no development team is set
          sed -i '' 's/DevelopmentTeam = [^;]*;/DevelopmentTeam = ;/g' "$PBXPROJ"
          echo "ProvisioningStyle set to Manual and DevelopmentTeam cleared"
      - name: Create entitlements for ad-hoc signing
        if: matrix.type == 'ios'
        run: |
          # Create entitlements for ad-hoc signing
          cat > src-tauri/gen/apple/inverter-dashboard.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.get-task-allow</key>
            <true/>
          </dict>
          </plist>
          EOF
          # Disable code signing via xcconfig
          cat > src-tauri/gen/apple/NoSign.xcconfig << 'EOF'
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = -
          DEVELOPMENT_TEAM =
          PROVISIONING_PROFILE_SPECIFIER =
          PROVISIONING_PROFILE =
          AD_HOC_CODE_SIGNING_ALLOWED = YES
          CODE_SIGN_STYLE = Automatic
          EOF
          echo "Generated entitlements:"
          cat src-tauri/gen/apple/inverter-dashboard.entitlements
          echo "Generated xcconfig:"
          cat src-tauri/gen/apple/NoSign.xcconfig
      - name: Build iOS (unsigned)
        env:
          XCODE_XCCONFIG_FILE: src-tauri/gen/apple/NoSign.xcconfig
          TAURI_APP_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm tauri ios build --ci

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Init Android project
        run: pnpm tauri android init --ci
      - name: Build Android
        run: pnpm tauri android build --ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: inverter-dashboard-android-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab