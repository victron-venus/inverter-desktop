name: Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Init iOS project
        env:
          # Required by Tauri CLI — empty value signals Release build, no dev server needed
          SERVER_ADDR_FILE: ""
        run: pnpm tauri ios init --ci --release
      - name: Disable code signing in Xcode project
        run: |
          python3 -c "
          import re
          p = 'src-tauri/gen/apple/inverter-dashboard.xcodeproj/project.pbxproj'
          with open(p) as f:
              c = f.read()
          c = re.sub(r'DEVELOPMENT_TEAM\s*=\s*\"[^\"]*\";', '', c)
          c = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*\"[^\"]*\";', 'CODE_SIGN_IDENTITY = \"-\";', c)
          c = re.sub(r'(SDKROOT = iphoneos;)',
              r'\1\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;', c)
          with open(p, 'w') as f:
              f.write(c)
          print('Code signing disabled')
          "
      - name: Build iOS (unsigned .app)
        env:
          TAURI_APP_VERSION: ${{ steps.version.outputs.version }}
          # Ensure Release build — Tauri will not look for dev server address
          SERVER_ADDR_FILE: ""
          RUST_BACKTRACE: "1"
        run: |
          # Build with xcodebuild — Release config prevents dev-server addr lookup
          xcodebuild archive \
            -project "src-tauri/gen/apple/inverter-dashboard.xcodeproj" \
            -scheme "inverter-dashboard_iOS" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "src-tauri/gen/apple/build/InverterDashboard.xcarchive" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64

      - name: Package .ipa
        run: |
          XCA="src-tauri/gen/apple/build/InverterDashboard.xcarchive"
          APP_DIR="$XCA/Products/Applications"
          mkdir -p Payload
          cp -R "$APP_DIR/"*.app Payload/
          zip -qr "inverter-dashboard-ios.ipa" Payload
          rm -rf Payload
          echo "Created inverter-dashboard-ios.ipa"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: inverter-dashboard-ios-v${{ steps.version.outputs.version }}
          path: inverter-dashboard-ios.ipa

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Init Android project
        run: pnpm tauri android init --ci
      - name: Build Android
        run: pnpm tauri android build --ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: inverter-dashboard-android-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
