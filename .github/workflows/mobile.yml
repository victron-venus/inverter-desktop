name: Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Init iOS project
        env:
          SERVER_ADDR_FILE: ""
        run: pnpm tauri ios init --ci
      - name: Ensure Archive config is Release
        run: |
          SCHEME="src-tauri/gen/apple/inverter-dashboard.xcodeproj/xcshareddata/xcschemes/inverter-dashboard_iOS.xcscheme"
          # Tauri may generate ArchiveAction with debug; force release
          sed -i.bak 's/buildConfiguration = "debug"/buildConfiguration = "release"/g' "$SCHEME"
          rm -f "$SCHEME.bak"
          echo "✓ Archive action set to release"
      - name: Disable code signing in Xcode project
        run: |
          python3 -c "
          import re
          p = 'src-tauri/gen/apple/inverter-dashboard.xcodeproj/project.pbxproj'
          with open(p) as f:
              c = f.read()
          c = re.sub(r'DEVELOPMENT_TEAM\s*=\s*\"[^\"]*\";', '', c)
          c = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*\"[^\"]*\";', 'CODE_SIGN_IDENTITY = \"-\";', c)
          # Remove any existing entries first (idempotent)
          c = re.sub(r'\n\s*CODE_SIGNING_ALLOWED\s*=\s*(YES|NO);', '', c)
          c = re.sub(r'\n\s*CODE_SIGNING_REQUIRED\s*=\s*(YES|NO);', '', c)
          # Add fresh entries after each SDKROOT = iphoneos;
          c = re.sub(r'(SDKROOT = iphoneos;)',
              r'\1\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;', c)
          with open(p, 'w') as f:
              f.write(c)
          print('Code signing disabled')
          "
      - name: Pre-build Rust library for iOS
        run: |
          cargo build --target aarch64-apple-ios --release \
            --package inverter-dashboard --lib \
            --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/gen/apple/Externals/arm64/release
          cp src-tauri/target/aarch64-apple-ios/release/libinverter_dashboard_lib.a \
            src-tauri/gen/apple/Externals/arm64/release/libapp.a

      - name: Patch Xcode build phase to skip xcode-script if lib exists
        run: python3 scripts/patch_pbxproj.py

      - name: Build iOS (unsigned .app)
        env:
          TAURI_APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Clean + custom DerivedData to avoid stale debug caches
          rm -rf "src-tauri/gen/apple/build/DerivedData"
          xcodebuild clean archive \
            -project "src-tauri/gen/apple/inverter-dashboard.xcodeproj" \
            -scheme "inverter-dashboard_iOS" \
            -sdk iphoneos \
            -configuration release \
            -archivePath "src-tauri/gen/apple/build/InverterDashboard.xcarchive" \
            -derivedDataPath "src-tauri/gen/apple/build/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64

      - name: Package .ipa
        run: |
          XCA="src-tauri/gen/apple/build/InverterDashboard.xcarchive"
          APP_DIR="$XCA/Products/Applications"
          mkdir -p Payload
          cp -R "$APP_DIR/"*.app Payload/
          zip -qr "inverter-dashboard-ios.ipa" Payload
          rm -rf Payload
          echo "Created inverter-dashboard-ios.ipa"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inverter-dashboard-ios-v${{ steps.version.outputs.version }}
          path: inverter-dashboard-ios.ipa

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - run: pnpm install --frozen-lockfile
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: Init Android project
        run: pnpm tauri android init --ci
      - name: Build Android
        run: pnpm tauri android build --ci
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inverter-dashboard-android-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
