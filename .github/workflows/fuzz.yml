name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - fuzz_json_parsing
          - fuzz_mqtt_handling
          - fuzz_command_parsing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true
          components: rust-src

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz targets
        working-directory: src-tauri
        run: cargo fuzz build --release ${{ matrix.target }}

      - name: Run fuzz tests
        working-directory: src-tauri
        run: cargo fuzz run --release ${{ matrix.target }} -- -max_total_time=60 -dict=fuzz/dictionaries/json.dict

      - name: Upload fuzz results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results-${{ matrix.target }}
          path: src-tauri/fuzz/artifacts/
