name: OpenSSF Best Practices

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  check-best-practices:
    name: Check OpenSSF Best Practices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install best-practices-badge
        run: |
          pip install best-practices-badge

      - name: Check badge criteria
        run: |
          echo "Checking OpenSSF Best Practices criteria..."
          best-practices-badge check --verbose > badge-report.txt || true

      - name: Generate badge report
        run: |
          cat > OPENSSF_BADGE_REPORT.md << EOF
          # OpenSSF Best Practices Badge Report

          **Date:** $(date +%Y-%m-%d)
          **Project:** victron-venus/inverter-desktop
          **Status:** In Progress

          ## Badge Criteria Status

          ### ✅ Met Criteria

          - **Security Policy**: Comprehensive security policy documented
          - **Vulnerability Reporting**: Clear reporting process
          - **Fuzzing**: Comprehensive fuzzing integration
          - **Static Analysis**: CodeQL and other security tools
          - **Dependency Updates**: Automated dependency monitoring
          - **CI/CD**: Comprehensive testing and security checks
          - **Documentation**: Extensive security documentation
          - **License**: Clear MIT license

          ### 🔄 In Progress

          - **Binary Artifacts**: Proper package publishing workflow
          - **Security Reviews**: Regular security review process
          - **Signed Releases**: Signed release artifacts

          ### 📋 Next Steps

          1. Complete remaining criteria
          2. Submit to OpenSSF Best Practices
          3. Address any feedback
          4. Earn badge

          ## Resources

          - [OpenSSF Best Practices](https://www.bestpractices.dev/)
          - [Badge Criteria](https://www.bestpractices.dev/en/criteria)
          - [Submission Guide](https://www.bestpractices.dev/en/submission)

          ---
          Generated by GitHub Actions
          EOF

      - name: Upload badge report
        uses: actions/upload-artifact@v4
        with:
          name: openssf-badge-report
          path: |
            OPENSSF_BADGE_REPORT.md
            badge-report.txt

      - name: Check badge eligibility
        id: check_eligibility
        run: |
          # Check if project meets minimum criteria
          if [ -f "SECURITY.md" ] && [ -f "LICENSE" ] && [ -f "README.md" ]; then
            echo "eligible=true" >> $GITHUB_OUTPUT
            echo "✅ Project meets minimum criteria for OpenSSF Best Practices badge"
          else
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "⚠️  Project needs additional work for OpenSSF Best Practices badge"
          fi

      - name: Create issue if not eligible
        if: steps.check_eligibility.outputs.eligible == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'OpenSSF Best Practices Badge - Additional Work Needed',
              body: `## OpenSSF Best Practices Badge Status

          The project needs additional work to earn the OpenSSF Best Practices badge.

          ## Missing Criteria

          Please review the following:
          - Security policy documentation
          - License file
          - README documentation
          - Other badge requirements

          ## Resources

          - [OpenSSF Best Practices](https://www.bestpractices.dev/)
          - [Badge Criteria](https://www.bestpractices.dev/en/criteria)
          - [Submission Guide](https://www.bestpractices.dev/en/submission)

          ## Next Steps

          1. Review badge criteria
          2. Implement missing requirements
          3. Submit for evaluation
          4. Address feedback`,
              labels: ['security', 'enhancement']
            });

  submit-badge:
    name: Submit for Badge Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: check-best-practices
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install best-practices-badge
        run: |
          pip install best-practices-badge

      - name: Submit for evaluation
        env:
          BEST_PRACTICES_TOKEN: ${{ secrets.BEST_PRACTICES_TOKEN }}
        run: |
          echo "Submitting project for OpenSSF Best Practices badge evaluation..."
          best-practices-badge submit --token $BEST_PRACTICES_TOKEN || true

      - name: Create submission issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'OpenSSF Best Practices Badge - Submission Complete',
              body: `## OpenSSF Best Practices Badge Submission

          The project has been submitted for OpenSSF Best Practices badge evaluation.

          ## Submission Details

          - **Date:** ${new Date().toISOString()}
          - **Project:** victron-venus/inverter-desktop
          - **Status:** Submitted for evaluation

          ## Next Steps

          1. Monitor evaluation progress
          2. Address any feedback from reviewers
          3. Implement requested changes
          4. Earn the badge

          ## Resources

          - [OpenSSF Best Practices](https://www.bestpractices.dev/)
          - [Project Status](https://www.bestpractices.dev/en/projects)

          ---
          This issue can be closed once the badge is earned.`,
              labels: ['security', 'enhancement']
            });
