name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd src-tauri
          cargo publish --token $CARGO_REGISTRY_TOKEN

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish to GitHub Packages
        env:
          CARGO_REGISTRIES_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri
          cargo publish --registry github

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, publish-github]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build release binaries
        run: |
          cd src-tauri
          cargo build --release

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## Release ${{ github.ref }}

            ### Changes
            - See commit history for detailed changes

            ### Installation
            ```bash
            cargo install inverter-dashboard
            ```

            ### Downloads
            - Source code: [GitHub](https://github.com/victron-venus/inverter-desktop)
            - crates.io: [inverter-dashboard](https://crates.io/crates/inverter-dashboard)
            - GitHub Packages: [inverter-dashboard](https://github.com/victron-venus/inverter-desktop/pkgs/container/inverter-dashboard)

            ### Security
            - Fuzzing: Comprehensive fuzz testing integration
            - Dependencies: Regular security audits
            - Vulnerability Reporting: See [SECURITY.md](SECURITY.md)

            ### Documentation
            - [README.md](README.md)
            - [FUZZING.md](FUZZING.md)
            - [OSS_FUZZ_GUIDE.md](OSS_FUZZ_GUIDE.md)
