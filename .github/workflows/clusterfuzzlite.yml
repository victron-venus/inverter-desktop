name: ClusterFuzzLite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read

jobs:
  clusterfuzzlite:
    name: ClusterFuzzLite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          profile: minimal
          toolchain: nightly
          override: true
          components: rust-src

      - name: Build fuzz targets
        run: |
          cd src-tauri
          cargo install cargo-fuzz
          cargo fuzz build --release fuzz_json_parsing
          cargo fuzz build --release fuzz_mqtt_handling
          cargo fuzz build --release fuzz_command_parsing

      - name: Run fuzz tests
        run: |
          cd src-tauri
          echo "Running fuzz_json_parsing..."
          timeout 120 cargo fuzz run --release fuzz_json_parsing -- -max_total_time=60 || true
          echo "Running fuzz_mqtt_handling..."
          timeout 120 cargo fuzz run --release fuzz_mqtt_handling -- -max_total_time=60 || true
          echo "Running fuzz_command_parsing..."
          timeout 120 cargo fuzz run --release fuzz_command_parsing -- -max_total_time=60 || true

      - name: Upload fuzz results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clusterfuzzlite-results
          path: src-tauri/fuzz/artifacts/
