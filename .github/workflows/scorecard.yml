name: Scorecard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  id-token: write  # Required for OIDC signing
  actions: read  # Required for workflow verification

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@main
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
        env:
          SCORECARD_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCORECARD_VCS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCORECARD_REPOSITORY: ${{ github.repository }}
          SCORECARD_REF: ${{ github.ref }}
          SCORECARD_SHA: ${{ github.sha }}
          SCORECARD_WORKFLOW_REF: ${{ github.workflow_ref }}
          SCORECARD_WORKFLOW_SHA: ${{ github.workflow_sha }}
          SCORECARD_RUN_ID: ${{ github.run_id }}
          SCORECARD_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
