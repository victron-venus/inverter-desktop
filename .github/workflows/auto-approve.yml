name: Auto Approve
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    # Only approve PRs from the owner
    if: github.event.pull_request.user.login == '4alvit'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Note: This requires "Allow GitHub Actions to create and approve pull requests" 
          # to be enabled in Settings > Actions > General
          gh pr review "$PR_URL" --approve || echo "Failed to approve. Check repository settings (Actions > General > Workflow permissions)"
