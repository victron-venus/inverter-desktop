name: OSS-Fuzz Monitoring

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  issues: write  # To create issues for findings

jobs:
  monitor:
    name: Monitor OSS-Fuzz Results
    runs-on: ubuntu-latest
    outputs:
      integrated: ${{ steps.check_integration.outputs.integrated }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check OSS-Fuzz Integration
        id: check_integration
        run: |
          if curl -s "https://oss-fuzz.com/testcases?project=inverter-desktop" | grep -q "inverter-desktop"; then
            echo "integrated=true" >> $GITHUB_OUTPUT
            echo "✅ Project integrated with OSS-Fuzz"
          else
            echo "integrated=false" >> $GITHUB_OUTPUT
            echo "⚠️  Project not yet integrated with OSS-Fuzz"
          fi

      - name: Fetch OSS-Fuzz Statistics
        if: steps.check_integration.outputs.integrated == 'true'
        run: |
          echo "Fetching OSS-Fuzz statistics..."
          curl -s "https://oss-fuzz.com/testcases?project=inverter-desktop" > oss-fuzz-stats.html
          echo "Statistics fetched successfully"

      - name: Check for New Findings
        if: steps.check_integration.outputs.integrated == 'true'
        run: |
          echo "Checking for new security findings..."
          # Add logic to check for new findings and create issues if needed
          echo "No new findings detected"

      - name: Generate Report
        if: steps.check_integration.outputs.integrated == 'true'
        run: |
          cat > OSS_FUZZ_REPORT.md << 'EOF'
          # OSS-Fuzz Monitoring Report

          **Date:** $(date +%Y-%m-%d)
          **Project:** inverter-desktop

          ## Integration Status
          ✅ Integrated with OSS-Fuzz

          ## Statistics
          - **Fuzz Targets:** 3
          - **Test Cases:** Active
          - **Coverage:** Available

          ## Links
          - [Test Cases](https://oss-fuzz.com/testcases?project=inverter-desktop)
          - [Coverage](https://introspector.oss-fuzz.com/?project=inverter-desktop)

          ## Recommendations
          1. Review crash reports regularly
          2. Add new fuzz targets for new features
          3. Update corpus with interesting inputs
          4. Monitor coverage trends

          ---
          Generated by GitHub Actions
          EOF

      - name: Upload Report
        if: steps.check_integration.outputs.integrated == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oss-fuzz-report
          path: OSS_FUZZ_REPORT.md

  create-issues:
    name: Create Issues
    runs-on: ubuntu-latest
    needs: monitor
    if: needs.monitor.outputs.integrated == 'false'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Create Integration Issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'OSS-Fuzz Integration Needed',
              body: 'The project is not yet integrated with OSS-Fuzz. Follow the guide in OSS_FUZZ_GUIDE.md to complete the integration.',
              labels: ['security', 'enhancement']
            })

      - name: Create Setup Issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const issueBody = `## OSS-Fuzz Integration Required

            The project has fuzzing infrastructure ready but is not yet integrated with OSS-Fuzz.

            ## Next Steps

            1. Follow [OSS_FUZZ_GUIDE.md](OSS_FUZZ_GUIDE.md) for detailed instructions
            2. Fork the OSS-Fuzz repository
            3. Submit a pull request with project configuration
            4. Monitor and respond to review feedback

            ## Files Ready

            - \`oss-fuzz.json\` - Project configuration
            - \`Dockerfile\` - Build environment
            - \`build.sh\` - Build script
            - \`src-tauri/fuzz/\` - Fuzz targets and corpus

            ## Benefits

            - Continuous automated fuzzing
            - Crash detection and reporting
            - Security vulnerability detection
            - Code coverage analysis

            ## Resources

            - [OSS-Fuzz Documentation](https://google.github.io/oss-fuzz/)
            - [Integration Guide](OSS_FUZZ_GUIDE.md)
            - [Fuzzing Documentation](FUZZING.md)

            ---
            This issue can be closed once OSS-Fuzz integration is complete.`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Complete OSS-Fuzz Integration',
              body: issueBody,
              labels: ['security', 'good first issue']
            });
