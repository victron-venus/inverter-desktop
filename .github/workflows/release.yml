# Updated Release workflow – now includes mobile builds and asset upload
name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: Check version change or manual dispatch
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$version" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -q "src-tauri/Cargo.toml"; then
            version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$version" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version-change
    if: needs.check-version-change.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install frontend dependencies
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install AppIndicator
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y libappindicator3-dev

      - name: Build app with tauri-action
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_APP_VERSION: ${{ needs.check-version-change.outputs.new_version }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}
        with:
          tagName: v${{ needs.check-version-change.outputs.new_version }}
          releaseName: Release v${{ needs.check-version-change.outputs.new_version }}
          args: ${{ matrix.args }}
          notarize: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_NOTARIZE == 'true' && matrix.platform == 'macos-latest' }}

  mobile:
    needs: [check-version-change, release]
    if: needs.check-version-change.outputs.should_release == 'true'
    name: Build & upload mobile artifacts
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            type: ios
          - platform: ubuntu-22.04
            type: android
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.type == 'ios' && 'aarch64-apple-ios' || 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # --------- iOS specific ---------
      - name: iOS – init project
        if: matrix.type == 'ios'
        env:
          SERVER_ADDR_FILE: ''
        run: pnpm tauri ios init --ci

      - name: iOS – ensure Archive config is Release
        if: matrix.type == 'ios'
        run: |
          SCHEME="src-tauri/gen/apple/inverter-dashboard.xcodeproj/xcshareddata/xcschemes/inverter-dashboard_iOS.xcscheme"
          sed -i.bak 's/buildConfiguration = "debug"/buildConfiguration = "release"/g' "$SCHEME"
          rm -f "$SCHEME.bak"
          echo "✓ Archive action set to release"

      - name: iOS – disable code signing
        if: matrix.type == 'ios'
        run: |
          python3 -c "
          import re
          p = 'src-tauri/gen/apple/inverter-dashboard.xcodeproj/project.pbxproj'
          with open(p) as f:
              c = f.read()
          c = re.sub(r'DEVELOPMENT_TEAM\s*=\s*\"[^\"]*\";', '', c)
          c = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*\"[^\"]*\";', 'CODE_SIGN_IDENTITY = \"-\";', c)
          # Remove any existing entries first (idempotent)
          c = re.sub(r'\n\s*CODE_SIGNING_ALLOWED\s*=\s*(YES|NO);', '', c)
          c = re.sub(r'\n\s*CODE_SIGNING_REQUIRED\s*=\s*(YES|NO);', '', c)
          # Add fresh entries after each SDKROOT = iphoneos;
          c = re.sub(r'(SDKROOT = iphoneos;)',
              r'\1\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;', c)
          with open(p, 'w') as f:
              f.write(c)
          print('Code signing disabled')
          "

      - name: iOS – pre-build Rust library
        if: matrix.type == 'ios'
        run: |
          cargo build --target aarch64-apple-ios --release \
            --package inverter-dashboard --lib \
            --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/gen/apple/Externals/arm64/release
          cp src-tauri/target/aarch64-apple-ios/release/libinverter_dashboard_lib.a \
            src-tauri/gen/apple/Externals/arm64/release/libapp.a

      - name: iOS – patch build phase to skip xcode-script
        if: matrix.type == 'ios'
        run: python3 scripts/patch_pbxproj.py

      - name: iOS – build (unsigned .app)
        if: matrix.type == 'ios'
        env:
          TAURI_APP_VERSION: ${{ needs.check-version-change.outputs.new_version }}
        run: |
          # Clean + custom DerivedData to avoid stale debug caches
          rm -rf "src-tauri/gen/apple/build/DerivedData"
          xcodebuild clean archive \
            -project "src-tauri/gen/apple/inverter-dashboard.xcodeproj" \
            -scheme "inverter-dashboard_iOS" \
            -sdk iphoneos \
            -configuration release \
            -archivePath "src-tauri/gen/apple/build/InverterDashboard.xcarchive" \
            -derivedDataPath "src-tauri/gen/apple/build/DerivedData" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64

          # Package .app into a sideload-ready .ipa
          XCA="src-tauri/gen/apple/build/InverterDashboard.xcarchive"
          APP_DIR="$XCA/Products/Applications"
          if [ ! -d "$APP_DIR" ]; then
            echo "No .app found in archive at $APP_DIR"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_DIR/"*.app Payload/
          # .ipa is a zip archive with Payload/ at the root
          zip -qr "${{ github.workspace }}/inverter-dashboard-ios.ipa" Payload
          rm -rf Payload
          echo "Created inverter-dashboard-ios.ipa"

      - name: iOS – upload artifact to release
        if: matrix.type == 'ios'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ needs.check-version-change.outputs.new_version }}
          files: ${{ github.workspace }}/inverter-dashboard-ios.ipa
          token: ${{ secrets.GITHUB_TOKEN }}
          overwrite_files: true

      # --------- Android specific ---------
      - name: Android – setup Java
        if: matrix.type == 'android'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android – setup SDK
        if: matrix.type == 'android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Android – init project
        if: matrix.type == 'android'
        run: pnpm tauri android init --ci

      - name: Android – build
        if: matrix.type == 'android'
        env:
          TAURI_APP_VERSION: ${{ needs.check-version-change.outputs.new_version }}
        run: pnpm tauri android build --ci

      - name: Android – upload artifact to release
        if: matrix.type == 'android'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ needs.check-version-change.outputs.new_version }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          token: ${{ secrets.GITHUB_TOKEN }}
          overwrite_files: true
