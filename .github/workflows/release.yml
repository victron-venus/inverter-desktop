# Updated Release workflow – now includes mobile builds and asset upload
name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.toml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: Check if Cargo.toml changed and get version
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "src-tauri/Cargo.toml"; then
            version=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$version" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version-change
    if: needs.check-version-change.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install frontend dependencies
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install AppIndicator
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y libappindicator3-dev

      - name: Build app with tauri-action
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_APP_VERSION: ${{ needs.check-version-change.outputs.new_version }}
        with:
          tagName: v${{ needs.check-version-change.outputs.new_version }}
          releaseName: Release v${{ needs.check-version-change.outputs.new_version }}
          args: ${{ matrix.args }}

  mobile:
    needs: release
    name: Build & upload mobile artifacts
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            type: ios
          - platform: ubuntu-22.04
            type: android
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.type == 'ios' && 'aarch64-apple-ios' || 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # --------- iOS specific ---------
      - name: iOS – init project
        if: matrix.type == 'ios'
        run: |
          pnpm tauri ios init --ci
          # Create entitlements for ad-hoc signing
          cat > src-tauri/gen/apple/inverter-dashboard.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.get-task-allow</key>
            <true/>
          </dict>
          </plist>
          EOF
          # Disable code signing via xcconfig
          cat > src-tauri/gen/apple/NoSign.xcconfig << 'EOF'
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGN_IDENTITY = -
          DEVELOPMENT_TEAM =
          PROVISIONING_PROFILE_SPECIFIER =
          PROVISIONING_PROFILE =
          AD_HOC_CODE_SIGNING_ALLOWED = YES
          CODE_SIGN_STYLE = Automatic
          EOF
        env:
          XCODE_XCCONFIG_FILE: src-tauri/gen/apple/NoSign.xcconfig

      - name: iOS – build
        if: matrix.type == 'ios'
        env:
          XCODE_XCCONFIG_FILE: src-tauri/gen/apple/NoSign.xcconfig
        run: pnpm tauri ios build --ci --target arm64-apple-ios

      - name: iOS – upload artifact to release
        if: matrix.type == 'ios'
        uses: softprops/action-gh-release@970e29c7f0335519b5e1f634dd4d92fdef9bd3ce
        with:
          files: src-tauri/gen/apple/build/arm64-iphoneos/**/*.ipa
          token: ${{ secrets.GITHUB_TOKEN }}

      # --------- Android specific ---------
      - name: Android – setup Java & SDK
        if: matrix.type == 'android'
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android – init project
        if: matrix.type == 'android'
        run: pnpm tauri android init --ci

      - name: Android – build
        if: matrix.type == 'android'
        run: pnpm tauri android build --ci

      - name: Android – upload artifact to release
        if: matrix.type == 'android'
        uses: softprops/action-gh-release@970e29c7f0335519b5e1f634dd4d92fdef9bd3ce
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          token: ${{ secrets.GITHUB_TOKEN }}
