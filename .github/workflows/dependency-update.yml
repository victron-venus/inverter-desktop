name: Dependency Update

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    outputs:
      has_vulnerabilities: ${{ steps.check_vulnerabilities.outputs.has_vulnerabilities }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        working-directory: src-tauri
        run: |
          echo "Checking for outdated Rust dependencies..."
          cargo outdated > ../outdated-report.txt || true

      - name: Run security audit
        working-directory: src-tauri
        run: |
          echo "Running security audit..."
          cargo audit > ../audit-report.txt || true

      - name: Check for vulnerabilities
        id: check_vulnerabilities
        run: |
          if grep -q "warning\|vulnerable" audit-report.txt 2>/dev/null; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate dependency report
        run: |
          cat > DEPENDENCY_REPORT.md << 'EOF'
          # Dependency Update Report

          **Date:** $(date +%Y-%m-%d)
          **Repository:** victron-venus/inverter-desktop

          ## Outdated Dependencies

          ```
          $(cat outdated-report.txt 2>/dev/null || echo "No outdated dependencies found")
          ```

          ## Security Audit

          ```
          $(cat audit-report.txt 2>/dev/null || echo "No security issues found")
          ```

          ## Recommendations

          1. Review outdated dependencies
          2. Update vulnerable dependencies
          3. Test changes thoroughly
          4. Monitor for new vulnerabilities

          ## Next Steps

          - Update dependencies manually or use automated tools
          - Run tests after updates
          - Monitor for breaking changes
          - Update documentation if needed

          ---
          Generated by GitHub Actions
          EOF

      - name: Upload dependency report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-report
          path: |
            DEPENDENCY_REPORT.md
            outdated-report.txt
            audit-report.txt

  create-security-issue:
    name: Create Security Issue
    runs-on: ubuntu-latest
    needs: update-dependencies
    if: needs.update-dependencies.outputs.has_vulnerabilities == 'true'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read audit report
        id: read_report
        run: |
          if [ -f "audit-report.txt" ]; then
            echo "report_content<<EOF" >> $GITHUB_OUTPUT
            cat audit-report.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "report_content=No audit report found" >> $GITHUB_OUTPUT
          fi

      - name: Create security issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const auditReport = '${{ steps.read_report.outputs.report_content }}';

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Vulnerabilities Detected',
              body: `## Security Audit Results

            The following security vulnerabilities were detected:

            \`\`\`
            ${auditReport}
            \`\`\`

            ## Action Required

            Please review and update the affected dependencies.

            ## Resources

            - [RustSec Advisory Database](https://rustsec.org/)
            - [cargo-audit documentation](https://github.com/rustsec/cargo-audit)
            - [Security Policy](SECURITY.md)`,
              labels: ['security', 'dependencies']
            });
