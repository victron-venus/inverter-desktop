name: Dependency Update

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        working-directory: src-tauri
        run: |
          echo "Checking for outdated Rust dependencies..."
          cargo outdated > ../outdated-report.txt || true

      - name: Run security audit
        working-directory: src-tauri
        run: |
          echo "Running security audit..."
          cargo audit > ../audit-report.txt || true

      - name: Generate dependency report
        run: |
          cat > DEPENDENCY_REPORT.md << EOF
          # Dependency Update Report

          **Date:** $(date +%Y-%m-%d)
          **Repository:** victron-venus/inverter-desktop

          ## Outdated Dependencies

          \`\`\`
          $(cat outdated-report.txt 2>/dev/null || echo "No outdated dependencies found")
          \`\`\`

          ## Security Audit

          \`\`\`
          $(cat audit-report.txt 2>/dev/null || echo "No security issues found")
          \`\`\`

          ## Recommendations

          1. Review outdated dependencies
          2. Update vulnerable dependencies
          3. Test changes thoroughly
          4. Monitor for new vulnerabilities

          ## Next Steps

          - Update dependencies manually or use automated tools
          - Run tests after updates
          - Monitor for breaking changes
          - Update documentation if needed

          ---
          Generated by GitHub Actions
          EOF

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            DEPENDENCY_REPORT.md
            outdated-report.txt
            audit-report.txt

      - name: Create PR if vulnerabilities found
        if: contains(files('audit-report.txt'), 'warning') || contains(files('audit-report.txt'), 'vulnerable')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditReport = fs.readFileSync('audit-report.txt', 'utf8');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Vulnerabilities Detected',
              body: `## Security Audit Results

          The following security vulnerabilities were detected:

          \`\`\`
          ${auditReport}
          \`\`\`

          ## Action Required

          Please review and update the affected dependencies.

          ## Resources

          - [RustSec Advisory Database](https://rustsec.org/)
          - [cargo-audit documentation](https://github.com/rustsec/cargo-audit)
          - [Security Policy](SECURITY.md)`,
              labels: ['security', 'dependencies']
            });
